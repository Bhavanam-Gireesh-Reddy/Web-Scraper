services:
  - type: web
    name: scrape-studio
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && playwright install chromium"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: scrape_chat_app
      - key: GROQ_API_KEY
        sync: false
      - key: SCRAPE_MAX_PAGES
        value: "46"
      - key: SCRAPER_MODE
        value: browser
