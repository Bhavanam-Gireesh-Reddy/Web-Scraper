<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scrape Studio{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="header-main">
                <a href="/" class="brand">
                    <div class="brand-mark">S</div>
                    <div class="brand-text">
                        <strong>Scrape Studio</strong>
                        <small>Web scraping & AI document chat</small>
                    </div>
                </a>
            </div>

            <nav class="site-nav">
                <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/history" class="{% if request.url.path == '/history' %}active{% endif %}">History</a>
            </nav>
        </header>

        {% if database_error %}
        <div class="alert-banner">
            <strong>Database notice:</strong> {{ database_error }}
        </div>
        {% endif %}

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/js/main.js" defer></script>
</body>
</html>
